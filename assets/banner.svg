<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1622"/>
      <stop offset="0.55" stop-color="#111d2b"/>
      <stop offset="1" stop-color="#1a2636"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#ff3d3d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>

  <!-- circuitry pattern -->
  <g stroke="#2a3f55" stroke-width="2" fill="none" opacity="0.55">
    <path d="M 60 40 L 60 100 L 140 100 L 140 160"/>
    <path d="M 200 40 L 200 80 L 260 80"/>
    <path d="M 900 300 L 960 300 L 960 260 L 1030 260"/>
    <path d="M 1080 320 L 1080 260 L 1040 260"/>
    <path d="M 700 320 L 700 280 L 760 280 L 760 240"/>
    <path d="M 40 260 L 100 260 L 100 220"/>
    <path d="M 1150 100 L 1090 100 L 1090 150"/>
  </g>
  <g fill="#3a5570" opacity="0.7">
    <circle cx="60" cy="40" r="4"/>
    <circle cx="140" cy="160" r="4"/>
    <circle cx="200" cy="40" r="4"/>
    <circle cx="260" cy="80" r="4"/>
    <circle cx="960" cy="300" r="4"/>
    <circle cx="1030" cy="260" r="4"/>
    <circle cx="1080" cy="320" r="4"/>
    <circle cx="760" cy="240" r="4"/>
    <circle cx="100" cy="220" r="4"/>
    <circle cx="1150" cy="100" r="4"/>
  </g>

  <!-- warning glow -->
  <ellipse cx="980" cy="180" rx="260" ry="220" fill="url(#glow)"/>

  <!-- key / patch motif on right -->
  <g transform="translate(940,150) rotate(-18)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="url(#keyGrad)" stroke-width="14"/>
    <rect x="34" y="-10" width="120" height="20" rx="6" fill="url(#keyGrad)"/>
    <rect x="120" y="6" width="16" height="26" fill="url(#keyGrad)"/>
    <rect x="145" y="6" width="16" height="34" fill="url(#keyGrad)"/>
  </g>

  <!-- lock silhouette lower right, half cut -->
  <g transform="translate(1050,250)" opacity="0.85">
    <rect x="-30" y="0" width="60" height="46" rx="8" fill="#233144" stroke="#ff8a3d" stroke-width="2"/>
    <path d="M -18 0 L -18 -20 A 18 18 0 0 1 18 -20 L 18 0" fill="none" stroke="#ff8a3d" stroke-width="4"/>
    <circle cx="0" cy="22" r="6" fill="#ff8a3d"/>
  </g>

  <!-- top accent bar -->
  <rect x="60" y="80" width="120" height="6" rx="3" fill="url(#accent)"/>

  <text x="60" y="170" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="64" fill="#f4f7fb">
    <tspan x="60" dy="0" textLength="1080.0" lengthAdjust="spacingAndGlyphs" font-size="56.2">Autodesk Inventor Full Access +</tspan>
    <tspan x="60" dy="78" textLength="260" lengthAdjust="spacingAndGlyphs">Product</tspan>
  </text>

  <text x="60" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#9fb3c8" textLength="330" lengthAdjust="spacingAndGlyphs">I can't help with that.</text>

  <!-- decorative underline echo -->
  <line x1="60" y1="305" x2="420" y2="305" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
</svg>